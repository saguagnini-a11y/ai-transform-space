    background: #fdf6e3; border-left: 3px solid #8b6914;
    transform: translateX(100%); transition: transform 0.35s cubic-bezier(.4,0,.2,1);

<script>
const data = {
  'mechanics-district': {
    tag: 'Landmark 1 · West District',
    title: 'The Mechanics District',
    desc: 'Decks, drafts, content, templates, summaries. Hand them over. That\'s fine. This district is real and useful but it is not where the value of the professional lives. The handover is already happening.',
    quote: '"People mentioned not having to build decks from scratch, getting support with content, and freeing up brain space for business conversations, stakeholder work, and deeper thinking."',
    tension: 'Handing over the Mechanics District is not the risk. The risk is not noticing when you start handing over the territory next door.'
  },
  'muscle-zone': {
    tag: 'Landmark 2 · Elevated Terrain',
    title: 'The Muscle Zone',
    desc: 'Critical thinking, creative depth, stakeholder judgment, decision-making. Still yours. Use it or lose it. The Muscle Zone atrophies when you stop visiting. AI can enter this territory — but only you can keep it alive.',
    quote: '"Creativity, decision-making, stakeholder work, and content can all be helped by AI — but they can also be weakened by it. The skill is noticing which side you are landing on."',
    tension: 'The Muscle Zone does not disappear suddenly. It fades. The warning signs are subtle — answers that come too easily, first drafts that feel good enough, thinking that stops before it gets uncomfortable.'
  },
  'first-output': {
    tag: 'Landmark 3 · On the Border',
    title: 'The First Output',
    desc: 'Looks polished. Sounds intelligent. Easy to submit as-is. Many stop here. The First Output is not wrong — it is just the beginning of the thinking, not the end. Stopping here means accepting the intern\'s first draft as the final answer.',
    quote: '"AI may make \'good enough\' easier to accept. The first output often looks polished and sounds intelligent. That can make it tempting to stop too soon."',
    tension: 'The First Output is the most visited landmark on this map. It is also a trap. The thinking that happens after it is where the real value lives.'
  },
  'intern-desk': {
    tag: 'Landmark 4 · Southwest Reminder',
    title: 'The Intern Desk',
    desc: 'A grounding landmark. You would not submit an intern\'s work to the board without reviewing it. The same logic applies here. The desk is a reminder that AI output requires the same oversight, judgment, and ownership as any junior collaborator\'s work.',
    quote: '"Work with AI like you would work with a new intern. You would not submit their work to a board without reviewing it. Do not do that with AI either." — Srishti Sehgal',
    tension: 'The Intern Desk is not about distrust. It is about professional responsibility. The person who submits the work owns the work.'
  },
  'can-should-border': {
    tag: 'Landmark 5 · Central Border',
    title: 'The Can / Should Border',
    desc: 'The most important boundary on this map. Hard to see. Easy to cross without noticing. Just because AI can produce something does not mean you should hand over that part of the work. Noticing when you are crossing this border is the skill.',
    quote: '"Just because AI can produce something does not mean we should hand over that part of the work. The table kept returning to this distinction. Noticing it is the skill."',
    tension: 'The Can/Should Border has no customs officer. You cross it yourself, without a stamp, often without realising. The border only becomes visible in retrospect.'
  },
  'creative-expansion': {
    tag: 'Landmark 6 · New Territory North',
    title: 'The Creative Expansion',
    desc: 'AI lets people make things they could not easily make before. This is a real and genuine expansion of what is possible. New territory that did not exist before. The risk is mistaking "I can" for "I should" — and wandering into the expansion without knowing where the Can/Should Border is.',
    quote: '"AI can help people make things they could not easily make before. That is a genuine expansion of what\'s possible. The risk is mistaking \'I can\' for \'I should\' and handing over the parts of the work that still matter."',
    tension: 'The Creative Expansion is real. It is also where the Can/Should Border is hardest to see — because everything looks possible and nothing looks like a cost.'
  },
  'archipelago': {
    tag: 'Landmark 7 · Southeast Islands',
    title: 'The Parallel Experiments Archipelago',
    desc: 'Every team doing their own thing. Figuring it out in separate corners. No collective learning across the islands. Shadow AI adoption becomes dozens of parallel experiments with no shared map.',
    quote: '"Every team ends up doing their own thing. Stuff moves fast. Without shared direction, \'AI adoption\' becomes dozens of parallel experiments with no collective learning across them."',
    tension: 'The islands are not wrong to experiment. They are wrong to do it alone. The archipelago needs a ferry.'
  }
};

function openSidebar(id) {
  const d = data[id];
  if (!d) return;
  document.getElementById('s-tag').textContent = d.tag;
  document.getElementById('s-title').textContent = d.title;
  document.getElementById('s-desc').textContent = d.desc;
  document.getElementById('s-quote').textContent = d.quote;
  document.getElementById('s-tension').textContent = d.tension;
  document.getElementById('sidebar').classList.add('open');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
}

document.getElementById('map-svg').addEventListener('click', function(e) {
  if (!e.target.closest('.pin-group')) closeSidebar();
});
