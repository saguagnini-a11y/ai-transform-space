<link rel="preconnect" href="https://fonts.googleapis.com" />

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #2a1f0e;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; font-family: 'IM Fell English', serif; overflow: hidden;
  }
  #map-wrapper { position: relative; width: 1100px; height: 740px; flex-shrink: 0; }
  #map-svg { width: 100%; height: 100%; display: block; }
  .pin-group { cursor: pointer; }
  .pin-group:hover .pin-circle { filter: brightness(1.2) drop-shadow(0 0 6px rgba(192,57,43,0.7)); }
  .pin-circle { transition: filter 0.2s; }
  #sidebar {
    position: absolute; top: 0; right: 0; width: 320px; height: 100%;
    background: #fdf6e3; border-left: 3px solid #8b6914;
    transform: translateX(100%); transition: transform 0.35s cubic-bezier(.4,0,.2,1);
    display: flex; flex-direction: column; z-index: 10; overflow: hidden;
  }
  #sidebar.open { transform: translateX(0); }
  #sidebar-inner { flex: 1; overflow-y: auto; padding: 24px 20px 20px; }
  #sidebar-close {
    position: absolute; top: 10px; right: 12px; background: none; border: none;
    font-size: 22px; cursor: pointer; color: #5a3e1b; line-height: 1; font-family: 'Cinzel', serif;
  }
  #sidebar-close:hover { color: #c0392b; }
  .s-tag {
    font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase;
    color: #c0392b; background: #fce8e6; border: 1px solid #c0392b;
    display: inline-block; padding: 2px 8px; border-radius: 2px; margin-bottom: 10px;
  }
  .s-title {
    font-family: 'Cinzel', serif; font-size: 17px; font-weight: 700; color: #2c1a06;
    line-height: 1.3; margin-bottom: 10px; border-bottom: 1px solid #c9a84c; padding-bottom: 8px;
  }
  .s-desc { font-family: 'IM Fell English', serif; font-size: 13px; color: #3a2a10; line-height: 1.65; margin-bottom: 14px; }
  .s-quote {
    font-family: 'IM Fell English', serif; font-style: italic; font-size: 13px; color: #1a1a1a;
    border-left: 3px solid #c0392b; padding: 8px 10px; background: #fdf0d0; line-height: 1.6; margin-bottom: 14px;
  }
  .s-tension-label { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: #8b6914; margin-bottom: 5px; }
  .s-tension { font-family: 'IM Fell English', serif; font-size: 12px; color: #5a3e1b; line-height: 1.6; background: #f5e6c0; border: 1px dashed #b8962a; padding: 8px 10px; border-radius: 3px; }
  #sidebar-footer { padding: 10px 20px; border-top: 1px solid #c9a84c; font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 0.1em; color: #8b6914; text-align: center; }
</style>

<script>
const data = {
  'automation-pockets': {
    tag: 'Landmark 1 · Scattered Deposits',
    title: 'The Automation Pockets',
    desc: 'Summaries, templates, translations, recurring event support, internal communications, analysis. Time genuinely saved — but in small amounts, scattered across the map. Not a revolution. Pockets. The time is there if you know where to dig.',
    quote: '"Setting up documents. Summarising meetings. Creating templates. Supporting recurring events. Helping with translations, analysis, and internal communications. The time is there — in pockets."',
    tension: 'The Automation Pockets are real but uneven. Some are deep. Some are already empty. Some cost more to excavate than the time they return.'
  },
  'blank-page': {
    tag: 'Landmark 2 · Sacred Center',
    title: 'The Blank Page',
    desc: 'Not a problem. A place. Where friction generates insight and the best ideas form. The Blank Page is where the thinking happens — the struggle that produces something the AI starting point cannot. Automating it away means losing what was built there.',
    quote: '"Starting from scratch is sometimes where the best ideas come from. Automation can skip the friction that generates insight. The question is knowing which friction to protect."',
    tension: 'The Blank Page looks like inefficiency from the outside. From the inside it is where the work actually happens. Protecting it requires being willing to explain why.'
  },
  'tool-model-ruins': {
    tag: 'Landmark 3 · West Ruins',
    title: 'The Tool Model Ruins',
    desc: 'Built around specific tools. Constantly needing rebuilding as tools change. Fragile, high-maintenance, already partially collapsed. A warning about what happens when automation strategy is built on the tool rather than the thinking.',
    quote: '"The group questioned whether automation should start with tools or with a way of thinking. Don\'t build a tool model for automation — build a mental model. The tools change. The approach shouldn\'t."',
    tension: 'The Tool Model Ruins are not a failure of ambition. They are a failure of foundation. Everything built on a specific tool inherits that tool\'s expiry date.'
  },
  'mental-model-highlands': {
    tag: 'Landmark 4 · East Highlands',
    title: 'The Mental Model Highlands',
    desc: 'The approach that survives when the tools move on. More solid than the Tool Model Ruins. Less visible. Built not around what AI can do today but around what good work looks like regardless of the tool. The highlands that stay standing.',
    quote: '"Don\'t build a tool model for automation — build a mental model. The tools change. The approach shouldn\'t."',
    tension: 'The Mental Model Highlands are harder to build than the Tool Model Ruins. They require thinking before building. Most organisations skip this step.'
  },
  'higher-goal': {
    tag: 'Landmark 5 · Beyond the Map',
    title: 'The Higher Goal',
    desc: 'Off the edge of the current map. Is automation the goal, or a means to a higher goal? The question that did not get answered. The most important destination on this map — and the only one that is not yet on it.',
    quote: '"Is automation the goal, or is it a means to a higher goal? We didn\'t get to answer this. That might be the most important question." — Pablo Alvarez',
    tension: 'The Higher Goal is not missing because nobody thought of it. It is missing because the conversation ran out of time. That might be the most honest thing about this map.'
  },
  'voice-flatland': {
    tag: 'Landmark 6 · South Flatland',
    title: 'The Voice Flatland',
    desc: 'What happens when automation drafts all internal communications. More messages. Less signal. Everyone talking. Nobody heard. The efficiency gain creates a different kind of cost — the flattening of voice, the loss of the human signal in the noise.',
    quote: '"When automation drafts communications faster, the voice flattens. More noise in internal channels, less signal. The efficiency gain creates a different kind of cost."',
    tension: 'The Voice Flatland is the unintended consequence nobody budgets for. You cannot automate your way back out of it.'
  },
  'thinking-quarter': {
    tag: 'Landmark 7 · Northeast Quarter',
    title: 'The Thinking Quarter',
    desc: 'Where the group wanted to spend the saved time. Making sense of information. Having better conversations. Connecting with people. Going deeper into the work, not just producing more of it. Human judgment. Strategic thinking. The work that still needs a human in the room.',
    quote: '"The group wanted to spend saved time on work that still needs human judgment. Thinking. Making sense of information. Having better conversations. Connecting with people. Going deeper into the work, not just producing more of it."',
    tension: 'The Thinking Quarter is the right destination. The road from the Automation Pockets to the Thinking Quarter is not automatic. You have to choose to build it.'
  }
};

function openSidebar(id) {
  const d = data[id];
  if (!d) return;
  document.getElementById('s-tag').textContent = d.tag;
  document.getElementById('s-title').textContent = d.title;
  document.getElementById('s-desc').textContent = d.desc;
  document.getElementById('s-quote').textContent = d.quote;
  document.getElementById('s-tension').textContent = d.tension;
  document.getElementById('sidebar').classList.add('open');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
}

document.getElementById('map-svg').addEventListener('click', function(e) {
  if (!e.target.closest('.pin-group')) closeSidebar();
});
</script>
