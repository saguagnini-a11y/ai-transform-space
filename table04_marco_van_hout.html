<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Unbundled Facilitation — Table IV · Marco van Hout</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #2a1f0e;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; font-family: 'IM Fell English', serif; overflow: hidden;
  }
  #map-wrapper { position: relative; width: 1100px; height: 740px; flex-shrink: 0; }
  #map-svg { width: 100%; height: 100%; display: block; }
  .pin-group { cursor: pointer; }
  .pin-group:hover .pin-circle { filter: brightness(1.2) drop-shadow(0 0 6px rgba(192,57,43,0.7)); }
  .pin-circle { transition: filter 0.2s; }
  #sidebar {
    position: absolute; top: 0; right: 0; width: 320px; height: 100%;
    background: #fdf6e3; border-left: 3px solid #8b6914;
    transform: translateX(100%); transition: transform 0.35s cubic-bezier(.4,0,.2,1);
    display: flex; flex-direction: column; z-index: 10; overflow: hidden;
  }
  #sidebar.open { transform: translateX(0); }
  #sidebar-inner { flex: 1; overflow-y: auto; padding: 24px 20px 20px; }
  #sidebar-close {
    position: absolute; top: 10px; right: 12px; background: none; border: none;
    font-size: 22px; cursor: pointer; color: #5a3e1b; line-height: 1; font-family: 'Cinzel', serif;
  }
  #sidebar-close:hover { color: #c0392b; }
  .s-tag {
    font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase;
    color: #c0392b; background: #fce8e6; border: 1px solid #c0392b;
    display: inline-block; padding: 2px 8px; border-radius: 2px; margin-bottom: 10px;
  }
  .s-title {
    font-family: 'Cinzel', serif; font-size: 17px; font-weight: 700; color: #2c1a06;
    line-height: 1.3; margin-bottom: 10px; border-bottom: 1px solid #c9a84c; padding-bottom: 8px;
  }
  .s-desc { font-family: 'IM Fell English', serif; font-size: 13px; color: #3a2a10; line-height: 1.65; margin-bottom: 14px; }
  .s-quote {
    font-family: 'IM Fell English', serif; font-style: italic; font-size: 13px; color: #1a1a1a;
    border-left: 3px solid #c0392b; padding: 8px 10px; background: #fdf0d0; line-height: 1.6; margin-bottom: 14px;
  }
  .s-tension-label { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: #8b6914; margin-bottom: 5px; }
  .s-tension { font-family: 'IM Fell English', serif; font-size: 12px; color: #5a3e1b; line-height: 1.6; background: #f5e6c0; border: 1px dashed #b8962a; padding: 8px 10px; border-radius: 3px; }
  #sidebar-footer { padding: 10px 20px; border-top: 1px solid #c9a84c; font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 0.1em; color: #8b6914; text-align: center; }
</style>
</head>

<script>
const data = {
  'prep-quarter': {
    tag: 'Landmark 1 · West District',
    title: 'The Prep Quarter',
    desc: 'Agendas, handouts, slides, materials, content generation, drafting. AI took most of it. The lights are still on but the work is mostly gone. Time has been returned — but the question of what to do with that time arrived without an answer.',
    quote: '"Agenda building. Handouts. Worksheets. Slides. Content generation. Drafting materials. That gives time back but it also raises the question: what do you do with that time? And what remains that only you can do?"',
    tension: 'The Prep Quarter feels like loss. It is actually an opportunity. The problem is that nobody told facilitators what to build in the space it left behind.'
  },
  'the-room': {
    tag: 'Landmark 2 · Central Territory',
    title: 'The Room',
    desc: 'The half worth owning. Adapting, noticing the experience, knowing what to do in the moment. Reading the energy. Knowing when to slow down. Sensing what\'s happening under the surface. AI does not have a pass for this territory.',
    quote: '"The value moves to the room, to the human read you can\'t easily put into words. That is what AI cannot do. It is also the hardest thing to defend on a budget." — Marco van Hout',
    tension: 'The Room is the most valuable territory on this map. It is also the hardest to put on an invoice.'
  },
  'craft-gap': {
    tag: 'Landmark 3 · Central Ravine',
    title: 'The Craft Gap',
    desc: 'The chasm between junior and senior work that used to take years to cross. AI builds a bridge over it. The question is whether crossing the bridge skips the learning or just the suffering. Where does judgement come from if you never did the junior work?',
    quote: '"AI may help less experienced facilitators produce more senior-looking work. But if people can jump to the output without building the understanding underneath, where do they learn the craft?"',
    tension: 'The bridge over the Craft Gap is real and useful. What it cannot carry is the experience that used to be built in the crossing.'
  },
  'budget-wall': {
    tag: 'Landmark 4 · South Wall',
    title: 'The Client\'s Budget Wall',
    desc: 'On one side: what the human room costs. On the other: what AI can approximate for a fraction of the price. The wall does not understand the difference. Clients want to reach more people with non-human facilitation. It\'s cheaper. The question they\'re not asking is whether it\'s better.',
    quote: '"Clients want to reach more people with non-human facilitation. It\'s cheaper. The question they\'re not asking is whether it\'s better — and that\'s the question we need to be asking for them."',
    tension: 'The Budget Wall is not the enemy. It is a question in disguise. The answer requires being able to articulate what happens in The Room in terms the wall can hear.'
  },
  'the-defence': {
    tag: 'Landmark 5 · Northeast · Unmapped',
    title: 'The Defence',
    desc: 'The place where facilitators can articulate the value of The Room in terms clients recognise. Nobody has fully mapped it yet. It requires a language for the intangible — for reading the room, for the human pulse, for the things that happen in the space between the agenda items.',
    quote: '"What do you tell a client who doesn\'t yet see why the human room costs what it costs, when AI can deliver something that looks professional for a fraction of the price?"',
    tension: 'The Defence is not about defending the past. It is about naming what The Room actually does — in a language that travels across the Budget Wall.'
  },
  'ai-bridge': {
    tag: 'Landmark 6 · New Construction',
    title: 'The AI Bridge',
    desc: 'AI helps less experienced facilitators produce more senior-looking outputs. The bridge is real. It is also untested at scale. The question is not whether it holds weight — it\'s whether the crossing teaches you anything.',
    quote: '"If you can skip straight to senior-level output with AI, where does judgement come from?"',
    tension: 'A bridge that skips the hard part is still a bridge. What it cannot carry is the understanding built in the difficult crossing.'
  }
};

function openSidebar(id) {
  const d = data[id];
  if (!d) return;
  document.getElementById('s-tag').textContent = d.tag;
  document.getElementById('s-title').textContent = d.title;
  document.getElementById('s-desc').textContent = d.desc;
  document.getElementById('s-quote').textContent = d.quote;
  document.getElementById('s-tension').textContent = d.tension;
  document.getElementById('sidebar').classList.add('open');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
}

document.getElementById('map-svg').addEventListener('click', function(e) {
  if (!e.target.closest('.pin-group')) closeSidebar();
});
</script>
