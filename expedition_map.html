<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The AI Fieldwork Expedition Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a0e04;
    min-height: 100vh;
    overflow: auto;
    display: flex;
    justify-content: center;
    padding: 20px;
  }
  #map-wrapper {
    position: relative;
    width: 1200px;
    height: 1200px;
    flex-shrink: 0;
    margin: auto;
  }
  #map-svg { width: 100%; height: 100%; display: block; }
  .pin-group { cursor: pointer; }
  .pin-group:hover .pin-circle { filter: brightness(1.2) drop-shadow(0 0 8px rgba(192,57,43,0.8)); }
  .pin-circle { transition: filter 0.2s; }
  #sidebar {
    position: absolute;
    top: 0; right: 0;
    width: 340px; height: 100%;
    background: #fdf6e3;
    border-left: 3px solid #8b6914;
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(.4,0,.2,1);
    display: flex; flex-direction: column;
    z-index: 20; overflow: hidden;
  }
  #sidebar.open { transform: translateX(0); }
  #sidebar-inner { flex: 1; overflow-y: auto; padding: 28px 22px 20px; }
  #sidebar-close {
    position: absolute; top: 12px; right: 14px;
    background: none; border: none; font-size: 22px;
    cursor: pointer; color: #5a3e1b; line-height: 1; font-family: 'Cinzel', serif;
  }
  #sidebar-close:hover { color: #c0392b; }
  .s-tag {
    font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase;
    color: #c0392b; background: #fce8e6; border: 1px solid #c0392b;
    display: inline-block; padding: 2px 8px; border-radius: 2px; margin-bottom: 10px;
  }
  .s-title {
    font-family: 'Cinzel', serif; font-size: 18px; font-weight: 700; color: #2c1a06;
    line-height: 1.3; margin-bottom: 10px; border-bottom: 1px solid #c9a84c; padding-bottom: 8px;
  }
  .s-desc { font-family: 'IM Fell English', serif; font-size: 13px; color: #3a2a10; line-height: 1.65; margin-bottom: 14px; }
  .s-quote {
    font-family: 'IM Fell English', serif; font-style: italic; font-size: 13px; color: #1a1a1a;
    border-left: 3px solid #c0392b; padding: 8px 10px; background: #fdf0d0; line-height: 1.6; margin-bottom: 14px;
  }
  .s-tension-label { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: #8b6914; margin-bottom: 5px; }
  .s-tension { font-family: 'IM Fell English', serif; font-size: 12px; color: #5a3e1b; line-height: 1.6; background: #f5e6c0; border: 1px dashed #b8962a; padding: 8px 10px; border-radius: 3px; }
  #sidebar-footer { padding: 10px 22px; border-top: 1px solid #c9a84c; font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 0.1em; color: #8b6914; text-align: center; }
</style>
</head>
<body>
<div id="map-wrapper">
<svg id="map-svg" viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg">
<defs>
  <filter id="parchment" x="0%" y="0%" width="100%" height="100%">
    <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
    <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
    <feBlend in="SourceGraphic" in2="gray" mode="multiply" result="blend"/>
    <feComposite in="blend" in2="SourceGraphic" operator="in"/>
  </filter>
  <filter id="pin-shadow"><feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-color="#000" flood-opacity="0.4"/></filter>
  <filter id="oracle-glow">
    <feGaussianBlur stdDeviation="12" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="crater-glow">
    <feGaussianBlur stdDeviation="8" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="naming-glow">
    <feGaussianBlur stdDeviation="6" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <radialGradient id="vignette" cx="50%" cy="50%" r="60%">
    <stop offset="40%" stop-color="transparent"/>
    <stop offset="100%" stop-color="#100804" stop-opacity="0.65"/>
  </radialGradient>
  <radialGradient id="crater-grad" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#080402"/>
    <stop offset="60%" stop-color="#1a0e06"/>
    <stop offset="100%" stop-color="#2c1808"/>
  </radialGradient>
  <radialGradient id="crater-rim" cx="50%" cy="50%" r="50%">
    <stop offset="70%" stop-color="transparent"/>
    <stop offset="100%" stop-color="#c0392b" stop-opacity="0.3"/>
  </radialGradient>
  <radialGradient id="oracle-grad" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#f8f080" stop-opacity="0.9"/>
    <stop offset="50%" stop-color="#e0c030" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#c09010" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="naming-grad" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
    <stop offset="70%" stop-color="#f0e8d0" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#e0d0a8" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="higher-goal-grad" cx="50%" cy="100%" r="80%">
    <stop offset="0%" stop-color="#f8e060" stop-opacity="0.6"/>
    <stop offset="100%" stop-color="#f8e060" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="blank-page-grad" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
    <stop offset="80%" stop-color="#f8f0e0" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#f2e8d0" stop-opacity="0"/>
  </radialGradient>
  <pattern id="water-lines" x="0" y="0" width="24" height="9" patternUnits="userSpaceOnUse">
    <path d="M0 4.5 Q6 1.5 12 4.5 Q18 7.5 24 4.5" stroke="#88b4d0" stroke-width="0.6" fill="none" opacity="0.5"/>
  </pattern>
  <pattern id="forest-dots" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse">
    <circle cx="7" cy="7" r="2.5" fill="#3a5a28" opacity="0.4"/>
  </pattern>
  <pattern id="elevation-lines" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
    <line x1="0" y1="8" x2="8" y2="0" stroke="#9a7830" stroke-width="0.5" opacity="0.35"/>
  </pattern>
  <pattern id="hedge-mini" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
    <circle cx="3" cy="3" r="1.5" fill="#3a5820" opacity="0.5"/>
    <circle cx="8" cy="8" r="1.2" fill="#4a6828" opacity="0.4"/>
  </pattern>
  <clipPath id="ocean-clip">
    <circle cx="600" cy="600" r="555"/>
  </clipPath>
  <clipPath id="land-clip">
    <!-- Clip to the landmass (territory ring) -->
    <path d="M 557.5 526 A 85 85 0 1 1 557.4 526 Z M 355 176 A 490 490 0 1 1 354.9 176 Z" fill-rule="evenodd"/>
  </clipPath>
</defs>

function openSidebar(id) {
  const d = data[id];
  if (!d) return;
  document.getElementById('s-tag').textContent = d.tag;
  document.getElementById('s-title').textContent = d.title;
  document.getElementById('s-desc').textContent = d.desc;
  document.getElementById('s-quote').textContent = d.quote;
  document.getElementById('s-tension').textContent = d.tension;
  document.getElementById('sidebar').classList.add('open');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
}

document.getElementById('map-svg').addEventListener('click', function(e) {
  if (!e.target.closest('.pin-group')) closeSidebar();
});
</script>
