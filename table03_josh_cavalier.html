<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Measurement Maze — Table III · Josh Cavalier</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #2a1f0e;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'IM Fell English', serif;
    overflow: hidden;
  }

  #map-wrapper {
    position: relative;
    width: 1100px;
    height: 740px;
    flex-shrink: 0;
  }

  #map-svg { width: 100%; height: 100%; display: block; }

  .pin-group { cursor: pointer; }
  .pin-group:hover .pin-circle {
    filter: brightness(1.2) drop-shadow(0 0 6px rgba(192,57,43,0.7));
  }
  .pin-circle { transition: filter 0.2s; }

  #sidebar {
    position: absolute;
    top: 0; right: 0;
    width: 320px; height: 100%;
    background: #fdf6e3;
    border-left: 3px solid #8b6914;
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(.4,0,.2,1);
    display: flex; flex-direction: column;
    z-index: 10; overflow: hidden;
  }
  #sidebar.open { transform: translateX(0); }

  #sidebar-inner { flex: 1; overflow-y: auto; padding: 24px 20px 20px; }

  #sidebar-close {
    position: absolute; top: 10px; right: 12px;
    background: none; border: none; font-size: 22px;
    cursor: pointer; color: #5a3e1b; line-height: 1;
    font-family: 'Cinzel', serif;
  }
  #sidebar-close:hover { color: #c0392b; }

  .s-tag {
    font-family: 'Cinzel', serif; font-size: 9px;
    letter-spacing: 0.15em; text-transform: uppercase;
    color: #c0392b; background: #fce8e6;
    border: 1px solid #c0392b; display: inline-block;
    padding: 2px 8px; border-radius: 2px; margin-bottom: 10px;
  }
  .s-title {
    font-family: 'Cinzel', serif; font-size: 17px; font-weight: 700;
    color: #2c1a06; line-height: 1.3; margin-bottom: 10px;
    border-bottom: 1px solid #c9a84c; padding-bottom: 8px;
  }
  .s-desc {
    font-family: 'IM Fell English', serif; font-size: 13px;
    color: #3a2a10; line-height: 1.65; margin-bottom: 14px;
  }
  .s-quote {
    font-family: 'IM Fell English', serif; font-style: italic;
    font-size: 13px; color: #1a1a1a;
    border-left: 3px solid #c0392b; padding: 8px 10px;
    background: #fdf0d0; line-height: 1.6; margin-bottom: 14px;
  }
  .s-tension-label {
    font-family: 'Cinzel', serif; font-size: 9px;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: #8b6914; margin-bottom: 5px;
  }
  .s-tension {
    font-family: 'IM Fell English', serif; font-size: 12px;
    color: #5a3e1b; line-height: 1.6;
    background: #f5e6c0; border: 1px dashed #b8962a;
    padding: 8px 10px; border-radius: 3px;
  }
  #sidebar-footer {
    padding: 10px 20px; border-top: 1px solid #c9a84c;
    font-family: 'Cinzel', serif; font-size: 9px;
    letter-spacing: 0.1em; color: #8b6914; text-align: center;
  }
</style>
</head>

  document.getElementById('s-tension').textContent = d.tension;
  document.getElementById('sidebar').classList.add('open');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
